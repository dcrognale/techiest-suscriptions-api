version: '3.8'

networks:
  app-tier:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres-db:
    image: postgres:14.12
    container_name: subscription_api_db
    environment:
      POSTGRES_DB: subscription_api_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - app-tier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5